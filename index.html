<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinPulse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="coinPulse-logo.png" type="image/x-icon">

</head>

</html>
